<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="100" cy="100" r="90" fill="url(#mainGrad)" opacity="0.15" filter="url(#glow)"/>
  
  <!-- Main container circle -->
  <circle cx="100" cy="100" r="75" fill="url(#mainGrad)" opacity="0.9" stroke="white" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Inner design elements -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  
  <!-- Dollar sign with better visibility -->
  <text x="100" y="120" font-size="60" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" filter="url(#glow)">$</text>
  
  <!-- Sales chart accent -->
  <path d="M 60 130 Q 80 110 100 120 T 140 100" stroke="url(#accentGrad)" stroke-width="4" fill="none" opacity="0.8" stroke-linecap="round"/>
  
  <!-- Decorative dots -->
  <circle cx="70" cy="70" r="3" fill="white" opacity="0.6"/>
  <circle cx="130" cy="70" r="3" fill="white" opacity="0.6"/>
  <circle cx="70" cy="150" r="3" fill="white" opacity="0.6"/>
  <circle cx="130" cy="150" r="3" fill="white" opacity="0.6"/>
</svg>
